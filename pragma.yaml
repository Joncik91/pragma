version: '2'
project:
  name: pragma
  mode: brownfield
  language: python
  source_root: packages/pragma/src/
  tests_root: packages/pragma/tests/
requirements:
- id: REQ-001
  title: CLI emits stable JSON on success and failure
  description: Every pragma subcommand exits zero with {ok:true,...} JSON on success and non-zero with
    {error:'code',message,remediation,context} JSON on failure, so Claude Code can branch on either path.
  touches:
  - src/pragma/cli/commands/init.py
  - src/pragma/cli/commands/spec.py
  - src/pragma/cli/commands/freeze.py
  - src/pragma/cli/commands/verify.py
  - src/pragma/cli/commands/doctor.py
  permutations:
  - id: init_success
    description: init emits {ok:true,created:[...]}
    expected: success
  - id: init_duplicate
    description: init on existing project emits already_initialised
    expected: reject
  - id: freeze_success
    description: freeze writes lock with sha256 hash
    expected: success
  - id: freeze_missing
    description: freeze without manifest emits manifest_not_found
    expected: reject
  - id: verify_success
    description: verify manifest passes on fresh freeze
    expected: success
  - id: verify_mismatch
    description: verify fails on stale lock with hash_mismatch
    expected: reject
  - id: doctor_always_zero
    description: doctor always exits zero
    expected: success
  milestone: M00
  slice: M00.S0
- id: REQ-002
  title: Manifest and lockfile round-trip deterministically
  description: The sha256 hash of pragma.yaml is stable across loads and changes only when the canonical
    YAML content changes. Lockfile writes are atomic (tempfile + rename) so an interrupted freeze never
    leaves a half-written lock.
  touches:
  - src/pragma/core/manifest.py
  - src/pragma/core/lockfile.py
  permutations:
  - id: hash_stable
    description: hash_manifest is stable across two loads of the same yaml
    expected: success
  - id: hash_changes
    description: hash_manifest changes when yaml content changes
    expected: success
  - id: write_atomic
    description: write_lock leaves no .tmp files on success
    expected: success
  - id: read_malformed
    description: read_lock on invalid json raises manifest_schema_error
    expected: reject
  milestone: M00
  slice: M00.S0
- id: REQ-003
  title: Slice gate enforces test-first discipline
  description: 'Once a slice is activated the gate is LOCKED. `pragma unlock` flips

    the gate only when every permutation of every requirement in the

    active slice has a matching failing test per the naming convention

    `test_req_<req_id>_<permutation_id>`. `pragma slice complete`

    requires all slice tests to be green. `audit.jsonl` records every

    transition.

    '
  touches:
  - src/pragma/core/state.py
  - src/pragma/core/audit.py
  - src/pragma/core/gate.py
  - src/pragma/core/tests_discovery.py
  - src/pragma/cli/commands/slice.py
  - src/pragma/cli/commands/unlock.py
  permutations:
  - id: activate_locks
    description: slice activate transitions inactive -> LOCKED and writes audit
    expected: success
  - id: unlock_requires_red_tests
    description: unlock fails when required tests are absent or passing
    expected: reject
  - id: unlock_from_locked_with_red_tests
    description: unlock succeeds when every permutation has a red test
    expected: success
  - id: complete_requires_green
    description: slice complete fails if any required test is red
    expected: reject
  - id: complete_ships_when_green
    description: slice complete transitions UNLOCKED -> shipped when tests pass
    expected: success
  - id: audit_append_only
    description: every transition appends one line to audit.jsonl
    expected: success
  milestone: M01
  slice: M01.S1
- id: REQ-004
  title: Claude Code hooks and pre-commit battery enforce v0.3 contract
  description: 'SessionStart emits additionalContext with gate state (≤9500 chars).

    PreToolUse denies src/ edits when LOCKED and denies non-touches

    edits when UNLOCKED. PostToolUse blocks on discipline violations.

    Stop runs `pragma verify all` and blocks on failure. `pragma hooks

    seal/verify/show` manage the integrity hash. `pragma verify

    discipline/commits/integrity` each have one exit code and one

    remediation. `pragma init --brownfield` writes .claude/settings.json

    + hash + expanded .pre-commit-config.yaml.

    '
  touches:
  - src/pragma/core/discipline.py
  - src/pragma/core/integrity.py
  - src/pragma/core/commits.py
  - src/pragma/hooks/session_start.py
  - src/pragma/hooks/pre_tool_use.py
  - src/pragma/hooks/post_tool_use.py
  - src/pragma/hooks/stop.py
  - src/pragma/hooks/dispatcher.py
  - src/pragma/cli/commands/hook.py
  - src/pragma/cli/commands/hooks.py
  - src/pragma/cli/commands/verify.py
  - src/pragma/cli/commands/init.py
  - src/pragma/templates/claude-settings.json.tpl
  - src/pragma/templates/pre-commit-config.yaml.tpl
  permutations:
  - id: session_start_emits_context
    description: SessionStart returns additionalContext with gate state
    expected: success
  - id: pre_tool_use_denies_locked_src
    description: PreToolUse denies src/ edit when gate LOCKED
    expected: reject
  - id: pre_tool_use_allows_test_files
    description: PreToolUse allows edits outside source_root
    expected: success
  - id: post_tool_use_blocks_complexity
    description: PostToolUse blocks on cyclomatic complexity > 10
    expected: reject
  - id: stop_blocks_on_verify_fail
    description: Stop blocks turn-end when verify all fails
    expected: reject
  - id: hooks_seal_writes_hash
    description: pragma hooks seal writes .pragma/claude-settings.hash
    expected: success
  - id: verify_integrity_rejects_drift
    description: pragma verify integrity exits 1 on hash mismatch
    expected: reject
  - id: init_writes_v03_artifacts
    description: pragma init --brownfield writes claude settings and hash
    expected: success
  milestone: M01
  slice: M01.S2
- id: REQ-005
  title: Runtime SDK and PIL dogfood
  description: 'Pragma''s own tests emit @pragma.trace spans and pragma report

    surfaces them as verified permutations in the PIL.

    '
  touches:
  - packages/pragma-sdk/src/pragma_sdk/trace.py
  - packages/pragma-sdk/src/pragma_sdk/permutation.py
  - packages/pragma-sdk/src/pragma_sdk/pytest_plugin.py
  - packages/pragma/src/pragma/report/aggregator.py
  - packages/pragma/src/pragma/report/formatter_md.py
  - packages/pragma/src/pragma/narrative/commit.py
  - packages/pragma/src/pragma/narrative/pr.py
  - packages/pragma/src/pragma/narrative/adr.py
  - packages/pragma/src/pragma/narrative/remediation.py
  - packages/pragma/src/pragma/cli/commands/report.py
  - packages/pragma/src/pragma/cli/commands/narrative.py
  permutations:
  - id: sdk_trace_emits_span
    description: '@trace decorator emits OTel span with pragma.logic_id'
    expected: success
  - id: sdk_permutation_attaches_baggage
    description: set_permutation attaches and detaches baggage cleanly
    expected: success
  - id: sdk_pytest_plugin_dumps_jsonl
    description: pytest plugin writes .pragma/spans/*.jsonl on session end
    expected: success
  - id: report_aggregator_detects_mock
    description: Test passes without matching span -> status mocked
    expected: success
  - id: report_json_deterministic
    description: pragma report --json output is byte-identical across runs
    expected: success
  - id: narrative_commit_passes_verify
    description: narrative commit output passes verify commits shape check
    expected: success
  - id: narrative_pr_contains_required_sections
    description: narrative pr includes Summary / REQs / PIL / review pointer
    expected: success
  milestone: M01
  slice: M01.S3
- id: REQ-006
  title: pragma report is byte-identical on repeat; manifest hash stable on noop freeze
  description: 'Pragma''s deterministic contract: two consecutive pragma report --json invocations must
    produce byte-identical output on the same commit, and pragma freeze on an unchanged pragma.yaml must
    not change its manifest hash. Locks in v1.0 done criterion #5 (§7.8) as an enforced test.'
  touches:
  - packages/pragma/src/pragma/report/aggregator.py
  - packages/pragma/src/pragma/core/manifest.py
  permutations:
  - id: report_byte_identical
    description: Two back-to-back pragma report --json invocations produce identical bytes
    expected: success
  - id: hash_stable_after_noop_freeze
    description: pragma freeze on an unchanged pragma.yaml leaves manifest_hash unchanged
    expected: success
  - id: lockfile_bytes_stable_after_noop_freeze
    description: pragma freeze on an unchanged pragma.yaml is a complete noop - pragma.lock.json bytes identical before and after
    expected: success
  milestone: M01
  slice: M01.S4
- id: REQ-007
  title: pre-commit ruff rev matches local ruff so format checks are stable
  description: 'The .pre-commit-config.yaml ruff-pre-commit rev must match the ruff version pinned in packages/pragma/pyproject.toml, so ruff-format run locally and by pre-commit agree on output and CI does not need SKIP=ruff-format as a workaround. Patches the v1.0 release-time ruff-skew incident (v0.8.6 in pre-commit vs 0.15.11 locally).'
  touches:
  - .pre-commit-config.yaml
  permutations:
  - id: rev_matches_local
    description: pre-commit run ruff-format --all-files is a noop on a tree already clean under local ruff
    expected: success
  - id: ci_format_check_green
    description: CI format check passes without SKIP=ruff-format
    expected: success
  milestone: M01
  slice: M01.S5
- id: REQ-008
  title: freeze emits structured JSON error when a requirement has null milestone or slice
  description: 'When pragma.yaml contains a requirement without milestone or slice assignment, pragma freeze must exit non-zero with a JSON payload {error:"requirement_unassigned", message, remediation, context:{requirement_id, missing_fields}} instead of crashing with a Python traceback. Fixes the v1.0 release-time bug where ValueError was non-serializable through the JSON error path.'
  touches:
  - packages/pragma/src/pragma/cli/commands/freeze.py
  - packages/pragma/src/pragma/core/freeze.py
  permutations:
  - id: null_milestone_rejected
    description: freeze on a manifest where a requirement has no milestone exits 1 with requirement_unassigned JSON
    expected: reject
  - id: null_slice_rejected
    description: freeze on a manifest where a requirement has milestone but no slice exits 1 with requirement_unassigned JSON
    expected: reject
  - id: all_assigned_success
    description: freeze on a manifest where every requirement has milestone and slice assigned succeeds
    expected: success
  milestone: M01
  slice: M01.S5
- id: REQ-009
  title: collect_tests finds pytest 9 nodeids regardless of inherited addopts
  description: 'pragma.core.tests_discovery.collect_tests must return per-test nodeids even when the parent pyproject pins -q (or other verbosity-suppressing flags) in addopts. Before v1.0.1, inherited `-q` under pytest 9 compacted collect-only output into file-summary form (`file.py: 4`) so the nodeid parser returned zero hits and every slice unlock reported all required tests as missing.'
  touches:
  - packages/pragma/src/pragma/core/tests_discovery.py
  permutations:
  - id: collects_under_parent_addopts_q
    description: collect_tests finds test functions when a parent pyproject sets addopts = "-q"
    expected: success
  - id: collects_from_clean_dir
    description: collect_tests without parent addopts still works
    expected: success
  milestone: M01
  slice: M01.S5
- id: REQ-010
  title: doctor --clean-spans prunes old span files by retention policy
  description: '`pragma doctor --clean-spans` removes old `.pragma/spans/*.jsonl` files to bound disk growth over long-running projects. Retention is configured via `spans_retention:` in `pragma.yaml` (keys `keep_runs` and `keep_days`, both optional; default `keep_runs: 50` when the block is absent) or overridden at the CLI with `--keep-runs N` / `--keep-days N`. `--dry-run` reports what would be deleted without touching the filesystem. Non-dry runs append a `spans_cleaned` event to `audit.jsonl` with files_removed, bytes_freed, and the strategy used. `doctor` base mode (no flag) reports `spans_count` and `spans_bytes` in its diagnostics so users see accumulation before it hurts.'
  touches:
  - packages/pragma/src/pragma/cli/commands/doctor.py
  - packages/pragma/src/pragma/core/spans.py
  - packages/pragma/src/pragma/core/models.py
  permutations:
  - id: clean_spans_keep_runs_removes_oldest
    description: with N+K files present, --keep-runs N removes the K oldest span files
    expected: success
  - id: clean_spans_keep_days_respects_mtime
    description: --keep-days D preserves files with mtime within D days and removes older ones
    expected: success
  - id: clean_spans_dry_run_no_fs_change
    description: --clean-spans --dry-run reports deletions without removing any file
    expected: success
  - id: clean_spans_default_keep_runs_50
    description: --clean-spans with no flags and no manifest config defaults to keep_runs=50
    expected: success
  - id: clean_spans_manifest_config_used
    description: --clean-spans with no CLI flags honours pragma.yaml spans_retention block
    expected: success
  - id: clean_spans_audit_event_appended
    description: non-dry --clean-spans appends a spans_cleaned event to audit.jsonl
    expected: success
  - id: doctor_base_reports_spans_stats
    description: plain `pragma doctor` includes spans_count and spans_bytes in diagnostics
    expected: success
  milestone: M01
  slice: M01.S6
- id: REQ-011
  title: run_tests overrides inherited addopts
  description: '`pragma.core.tests_discovery.run_tests` must clear inherited pytest `addopts` via `-o addopts=` so that a user `pytest.ini` or `pyproject.toml` pinning `-q` does not compress pytest output below what run_tests regex can parse. Before v1.0.6, a greenfield `pytest.ini` with `addopts = -q` made `pragma slice complete` report every test as `error` even when the tests passed, because `-q` turned per-test `PASSED/FAILED` lines into `.`/`F` dots. Matches the fix already in `collect_tests` (v1.0.3, BUG-009/KI-12).'
  touches:
  - packages/pragma/src/pragma/core/tests_discovery.py
  permutations:
  - id: runs_under_parent_addopts_q
    description: run_tests reports the correct verdicts when a parent pytest.ini pins -q in addopts
    expected: success
  - id: runs_from_clean_dir
    description: run_tests without parent addopts still returns correct verdicts
    expected: success
  milestone: M01
  slice: M01.S7
- id: REQ-012
  title: slice cancel resets state to fully neutral
  description: '`pragma slice cancel` must reset `.pragma/state.json` to the default neutral shape bound to the current lock hash, not just null out `active_slice`. Before v1.0.6, cancel left the previous `manifest_hash` in state, so `pragma verify gate` failed with `gate_hash_drift` if the manifest had changed since activation, and `doctor --emergency-unlock` refused because it saw state as already neutral. The user had no in-tool recovery path and had to delete `.pragma/state.json` by hand.'
  touches:
  - packages/pragma/src/pragma/cli/commands/slice.py
  - packages/pragma/src/pragma/core/gate.py
  permutations:
  - id: cancel_rebinds_to_current_lock_hash
    description: after cancel, state.manifest_hash equals the current lock hash
    expected: success
  - id: cancel_then_verify_gate_passes
    description: pragma verify gate is green after cancel even if manifest was rewritten mid-slice
    expected: success
  milestone: M01
  slice: M01.S7
- id: REQ-013
  title: greenfield scaffold ships src import glue
  description: '`pragma init --greenfield --language python` must scaffold tests in a way that allows `from <module> import ...` where `<module>` lives in `src/`. Before v1.0.6 the scaffold wrote `src/` and `tests/` but no `conftest.py` or `pyproject.toml` wiring, so the first test file written per the documented convention raised ImportError and blocked `pragma unlock`. Fix: the init template writes `tests/conftest.py` that inserts `<project>/src` into `sys.path`.'
  touches:
  - packages/pragma/src/pragma/core/greenfield.py
  - packages/pragma/src/pragma/templates/conftest.py.tpl
  permutations:
  - id: greenfield_writes_conftest
    description: pragma init --greenfield writes tests/conftest.py
    expected: success
  - id: greenfield_tests_can_import_src
    description: a fresh greenfield tree can collect a test that imports from src/
    expected: success
  milestone: M01
  slice: M01.S7
- id: REQ-014
  title: slice complete subprocess cwd honours manifest source layout
  description: 'BUG-018 (ex-KI-13). `pragma.core.tests_discovery.run_tests` and `collect_tests` invoke pytest with `cwd=tests_dir.parent`, which breaks on brownfield workspaces where `tests_root` is more than one directory deep (e.g. Pragma''s own `packages/pragma/tests/`): the emitted nodeids are relative to the user cwd but pytest is chdir''d below that, so it looks for them at a doubled path and every test reports as `error`. Fix: accept a `cwd` parameter defaulting to `Path.cwd()` from the caller, and thread the real project root through.'
  touches:
  - packages/pragma/src/pragma/core/tests_discovery.py
  - packages/pragma/src/pragma/cli/commands/slice.py
  - packages/pragma/src/pragma/cli/commands/unlock.py
  permutations:
  - id: collect_tests_on_nested_tests_root
    description: collect_tests returns nodeids that run_tests can consume when tests_root is packages/foo/tests/
    expected: success
  - id: run_tests_on_nested_tests_root
    description: run_tests returns the correct verdicts when tests_root is packages/foo/tests/
    expected: success
  milestone: M01
  slice: M01.S7
- id: REQ-015
  title: pragma package pyproject separates runtime and dev deps
  description: 'BUG-019 (ex-KI-14). `packages/pragma/pyproject.toml` lists ruff, mypy, pytest-cov, pre-commit, types-PyYAML, opentelemetry-api, opentelemetry-sdk under `[project.dependencies]` — but they are not imported by pragma at runtime. Deptry correctly reports them as DEP002 unused dependencies. Fix: move them to `[project.optional-dependencies.dev]` so `pip install pragma` pulls only real runtime deps and `pip install pragma[dev]` pulls the full set. After fix, deptry hook runs clean on both packages/pragma and packages/pragma-sdk.'
  touches:
  - packages/pragma/pyproject.toml
  - .pre-commit-config.yaml
  permutations:
  - id: runtime_deps_do_not_include_dev_tools
    description: packages/pragma/pyproject.toml project.dependencies contains none of ruff/mypy/pre-commit/pytest-cov/types-PyYAML/opentelemetry-api/opentelemetry-sdk
    expected: success
  - id: dev_extra_contains_dev_tools
    description: packages/pragma/pyproject.toml project.optional-dependencies.dev contains all the dev tools
    expected: success
  - id: deptry_clean_on_pragma_package
    description: deptry src exits 0 with no issues on packages/pragma
    expected: success
  milestone: M01
  slice: M01.S7
- id: REQ-016
  title: pragma's internal pytest runs emit junit.xml by default
  description: 'BUG-020. `pragma.core.tests_discovery.run_tests` passes `-o addopts=` to clear inherited `-q` from user pytest.ini (BUG-015 fix). That clear also strips any `--junit-xml=<path>` the user declared in addopts, so `pragma slice complete` and `pragma unlock` finish without writing `.pragma/pytest-junit.xml`. The PIL aggregator requires junit + spans to mark a permutation "verified"; with junit missing, every permutation reads "missing" on a fresh greenfield project - contradicting the docs. Fix: run_tests emits junit explicitly via `--junit-xml=<path>` so it survives the addopts clear, defaulting to `<cwd>/.pragma/pytest-junit.xml` which is where the aggregator looks.'
  touches:
  - packages/pragma/src/pragma/core/tests_discovery.py
  permutations:
  - id: run_tests_writes_junit_xml
    description: run_tests emits a non-empty junit.xml at the default path when no explicit path is given
    expected: success
  - id: run_tests_honours_explicit_junit_path
    description: run_tests honours an explicit junit_xml parameter over the default
    expected: success
  - id: run_tests_junit_survives_addopts_q
    description: run_tests emits junit.xml even when a parent pytest.ini pins -q in addopts
    expected: success
  milestone: M01
  slice: M01.S8
- id: REQ-017
  title: report surfaces which artifact is missing instead of silent "missing"
  description: 'BUG-020 companion. When the PIL aggregator computes "missing" for ≥50% of permutations because `.pragma/pytest-junit.xml` (or `.pragma/spans/`) is absent, `pragma report --human` and `--json` must include a diagnostic banner naming the absent artifact and the one-line fix. Without the banner, a user who hits the failure mode sees a silent wall of "missing" rows with "No remediation." - the worst possible UX for a tool whose whole point is trusted summaries.'
  touches:
  - packages/pragma/src/pragma/cli/commands/report.py
  - packages/pragma/src/pragma/report/aggregator.py
  permutations:
  - id: report_banner_when_junit_absent
    description: pragma report --human shows a banner when junit.xml is missing
    expected: success
  - id: report_banner_when_spans_absent
    description: pragma report --human shows a banner when .pragma/spans/ is missing or empty
    expected: success
  - id: report_no_banner_on_happy_path
    description: pragma report --human does not show a banner when both artifacts exist and the permutation count is correct
    expected: success
  milestone: M01
  slice: M01.S8
- id: REQ-018
  title: pre-release-smoke asserts end-to-end PIL reachability
  description: '`scripts/pre-release-smoke.sh` currently runs `pragma verify all` and checks that span files exist but never runs `pragma report` end-to-end. That blind spot is what let BUG-020 ship. Fix: after the first `slice complete` in the greenfield smoke section, assert `.pragma/pytest-junit.xml` exists and is non-empty, run `pragma report --human`, assert it contains at least one "ok" row and no banners, and run `pragma report --json` parsing for `summary.ok > 0` and `summary.missing == 0`. Exit non-zero if any assertion fails.'
  touches:
  - scripts/pre-release-smoke.sh
  permutations:
  - id: smoke_asserts_junit_exists
    description: smoke script exits non-zero when junit.xml is not produced after slice complete
    expected: success
  - id: smoke_asserts_pil_verified
    description: smoke script exits non-zero when pragma report --json shows any missing permutations
    expected: success
  milestone: M01
  slice: M01.S8
- id: REQ-019
  title: docs describe the loop as it actually is
  description: 'The daily flow described in README / concepts.md / usage.md / reference.md / claude.md.tpl shows activate → red tests → unlock → implement → complete. After REQ-016 lands, that exact flow produces junit + spans automatically, and the PIL shows real coverage. Docs must state that - including what artifacts the PIL depends on - so a first-run user knows what to expect, and so the v1.0 done-criterion "PIL legible to 3 non-coders" becomes a question of legibility rather than reachability.'
  touches:
  - README.md
  - docs/concepts.md
  - docs/usage.md
  - docs/reference.md
  - packages/pragma/src/pragma/templates/claude.md.tpl
  permutations:
  - id: readme_describes_full_loop
    description: README Quick start explicitly names the `pragma report --human` step as part of the loop
    expected: success
  - id: concepts_describes_artifacts
    description: docs/concepts.md states the PIL requires junit + spans and that pragma's own flows produce both
    expected: success
  - id: primer_mentions_report_step
    description: greenfield claude.md primer ends with a "make the PIL useful" section pointing at @trace + set_permutation
    expected: success
  milestone: M01
  slice: M01.S8
- id: REQ-020
  title: slice complete emits junit covering all project tests not just the active slice
  description: 'BUG-021. After `pragma slice complete` succeeds its per-slice gate check, it must regenerate `.pragma/pytest-junit.xml` from a full-suite pytest run so `pragma report` across multiple shipped slices sees every permutation, not just the last slice''s. Without this, a project that ships N slices reports N-1 slices as `missing` in the PIL even though every test is green. Fix is a dedicated helper `run_full_suite_junit` that runs pytest against the whole tests_dir and writes junit; called by slice complete after gate-check, not by unlock (unlock only cares about per-slice red-test verdicts).'
  touches:
  - packages/pragma/src/pragma/core/tests_discovery.py
  - packages/pragma/src/pragma/cli/commands/slice.py
  - scripts/pre-release-smoke.sh
  permutations:
  - id: run_full_suite_writes_junit_for_all_tests
    description: run_full_suite_junit produces a junit.xml containing every test under tests_dir
    expected: success
  - id: slice_complete_regenerates_full_junit
    description: after `pragma slice complete` the junit contains tests from every previously-shipped slice plus the current one
    expected: success
  - id: smoke_ships_two_slices_and_pil_sees_both
    description: the pre-release smoke script ships two slices and asserts pragma report shows both as verified
    expected: success
  milestone: M01
  slice: M01.S9
- id: REQ-021
  title: state.manifest_hash rebinds to current lock on every transition
  description: 'BUG-022. Gate-state transitions (activate, unlock, complete, cancel) preserved state.manifest_hash from the previous state. After a greenfield init followed by manifest edits + freeze, state still carries the scaffold''s original hash. verify gate then reports gate_hash_drift once all slices have shipped (active=None, gate=None but state.manifest_hash is the stale one). cancel was already fixed in v1.0.6 (BUG-016); v1.1.2 generalises the same pattern to activate / unlock / complete.'
  touches:
  - packages/pragma/src/pragma/core/gate.py
  - packages/pragma/src/pragma/cli/commands/slice.py
  - packages/pragma/src/pragma/cli/commands/unlock.py
  permutations:
  - id: activate_rebinds_manifest_hash
    description: activate writes state.manifest_hash equal to the current lock hash
    expected: success
  - id: unlock_rebinds_manifest_hash
    description: unlock writes state.manifest_hash equal to the current lock hash
    expected: success
  - id: complete_rebinds_manifest_hash
    description: slice complete writes state.manifest_hash equal to the current lock hash
    expected: success
  - id: verify_gate_green_after_shipping_all_slices
    description: after shipping every slice on a greenfield that was refrozen post-init, verify gate is green
    expected: success
  milestone: M01
  slice: M01.S10
- id: REQ-022
  title: slice activate refuses to un-ship a shipped slice
  description: 'BUG-024. Before this fix, `pragma slice activate <id>` on a slice whose state.slices record already had status=shipped quietly transitioned it back to in_progress + LOCKED, erased the ship record, and (cascadingly) made dependent slices in later milestones refuse activation because the dep check walks state.slices. No confirmation, no warning, no recoverable audit. Real data loss from a perfectly plausible command. Fix - activate raises slice_already_shipped when the target slice is shipped (without --force). With --force the existing BUG-011 behaviour takes over.'
  touches:
  - packages/pragma/src/pragma/core/gate.py
  - packages/pragma/src/pragma/core/errors.py
  permutations:
  - id: activate_refuses_shipped
    description: activate on a shipped slice raises slice_already_shipped
    expected: reject
  - id: activate_force_reopens_shipped
    description: activate --force on a shipped slice reopens it deliberately
    expected: success
  - id: shipped_record_survives_refused_activate
    description: after a refused activate, state.slices still shows the slice as shipped
    expected: success
  milestone: M01
  slice: M01.S11
- id: REQ-023
  title: single-permutation requirement scored ok without set_permutation
  description: 'BUG-023. When a requirement declares exactly one permutation, tests may legitimately skip the `set_permutation(...)` call; the span still carries `pragma.logic_id` and the test-name binding is unambiguous. Before this fix the aggregator matcher required the span''s `pragma.permutation` attr to equal the declared permutation id literally, so spans with the SDK default `"none"` value never matched and the permutation read as `mocked`. Fix - when total_permutations == 1, accept a `"none"` span as a match (the courtesy the comment already advertised).'
  touches:
  - packages/pragma/src/pragma/report/aggregator.py
  permutations:
  - id: single_perm_without_set_permutation_is_ok
    description: a single-permutation REQ whose test omits set_permutation scores ok
    expected: success
  - id: multi_perm_still_requires_exact_match
    description: a multi-permutation REQ still requires pragma.permutation to match perm_id literally
    expected: success
  - id: single_perm_with_explicit_set_permutation_still_ok
    description: the courtesy does not regress the explicit-match path; single-perm with set_permutation still scores ok
    expected: success
  milestone: M01
  slice: M01.S12
- id: REQ-024
  title: narrative commit filters noise and derives WHY from active slice
  description: 'BUG-026. Commit message generation must not leak `.pyc`, `__pycache__/`, `.pragma/` cache entries, audit.jsonl, or state lock files into WHAT / WHERE. When a slice is active, WHY must describe the slice title + declared permutation verdicts, not echo the first line of a requirement description.'
  touches:
  - packages/pragma/src/pragma/narrative/commit.py
  - packages/pragma/src/pragma/templates/commit-message.tpl
  permutations:
  - id: filters_noise_files
    description: generated message does not include .pyc, __pycache__, .pragma/*, audit.jsonl, or state lock files in its file list
    expected: success
  - id: why_derived_from_active_slice
    description: when a slice is active, WHY names the slice title and summarises permutation verdicts rather than echoing a REQ description
    expected: success
  - id: handles_no_active_slice
    description: without an active slice, message still renders (fallback WHY) and commit shape stays valid
    expected: success
  milestone: M01
  slice: M01.S13
- id: REQ-025
  title: narrative commit remembers the just-shipped slice + clean directory labels
  description: 'BUG-027. Between `pragma slice complete` and the next `pragma slice activate`, there is no active_slice in state.json but state.slices holds the recently-shipped records. `pragma narrative commit` in this window emitted the no-slice fallback WHY ("Maintenance change outside any active slice."), which reads as amnesia. Also _summarise_files appended a "/" to every segment in its "N files across X/" output, making top-level files look like directories ("pragma.yaml/" rather than "pragma.yaml"). Fix - when active_slice is None, derive WHY from the most-recently-completed slice in state.slices; only add "/" to entries that genuinely were directories in the staged path list.'
  touches:
  - packages/pragma/src/pragma/narrative/commit.py
  permutations:
  - id: why_uses_recent_shipped_when_no_active_slice
    description: without active_slice but with a recently-shipped slice, WHY cites the shipped slice title
    expected: success
  - id: summarise_does_not_add_slash_to_top_level_files
    description: top-level files are rendered without a trailing slash in the summary
    expected: success
  milestone: M01
  slice: M01.S14
- id: REQ-026
  title: hooks verify signals drift via ok=false + non-zero exit
  description: 'BUG-029. pragma hooks verify returned ok=true with integrity=drifted + exit 0 when the hash mismatch detected tampering. Any CI script or pre-push hook that read the ok field would treat drift as success. pragma verify integrity already returns ok=false + exit 1 on drift; hooks verify was the inconsistent surface. Fix - on drifted, return ok=false and raise typer.Exit(1); other non-drift states keep ok=true + exit 0.'
  touches:
  - packages/pragma/src/pragma/cli/commands/hooks.py
  permutations:
  - id: drifted_is_ok_false_and_exit_1
    description: hooks verify on a tampered settings.json returns ok=false and exit 1
    expected: reject
  - id: sealed_is_ok_true_and_exit_0
    description: hooks verify on a clean sealed settings.json returns ok=true and exit 0
    expected: success
  - id: not_sealed_is_ok_true_and_exit_0
    description: hooks verify when no hash exists yet returns ok=true integrity=not_sealed and exit 0
    expected: success
  - id: no_settings_is_ok_true_and_exit_0
    description: hooks verify when there is no .claude/settings.json returns ok=true integrity=no_settings and exit 0
    expected: success
  milestone: M01
  slice: M01.S15
- id: REQ-027
  title: narrative remediation serves real error codes
  description: 'BUG-028. The remediation catalogue had only discipline-AST rules. User-facing error codes (commit_shape_violation, unlock_missing_tests, slice_already_shipped, gate_hash_drift, manifest_hash_mismatch) fell through to generic placeholder text. Fix - catalogue entries for the common error codes a user hits under pre-commit / pre-push / CI. Generic fallback stays for unknown codes so the CLI does not crash.'
  touches:
  - packages/pragma/src/pragma/narrative/remediation.py
  permutations:
  - id: known_discipline_rule_is_specific
    description: remediation for 'complexity' names extract helpers and early returns
    expected: success
  - id: known_error_code_is_specific
    description: remediation for 'commit_shape_violation' names WHY / trailer / subject length
    expected: success
  - id: unknown_rule_falls_back_to_generic
    description: remediation for an unknown rule string still returns a non-empty generic message
    expected: success
  milestone: M01
  slice: M01.S16
- id: REQ-028
  title: spec add-requirement assigns milestone and slice
  description: 'BUG-031. The authoring CLI must be able to produce a freezable requirement without manual YAML editing. Adds --milestone MNN and --slice MNN.SN to pragma spec add-requirement. The resulting pragma.yaml passes pragma freeze and pragma verify manifest without further hand-editing.'
  touches:
  - packages/pragma/src/pragma/cli/commands/spec.py
  permutations:
  - id: accepts_milestone_and_slice
    description: pragma spec add-requirement --milestone M01 --slice M01.S1 writes both fields
    expected: success
  - id: freeze_passes_after_add
    description: pragma freeze succeeds on a manifest where every requirement was added via CLI with milestone+slice
    expected: success
  - id: rejects_unknown_slice
    description: pragma spec add-requirement --slice M99.S99 raises slice_not_found with declared slice ids in the remediation
    expected: reject
  milestone: M01
  slice: M01.S17
- id: REQ-029
  title: audit_orphan diagnostic ignores non-slice events
  description: 'BUG-030. doctor diagnosed an audit_orphan false positive whenever audit.jsonl had entries like hooks_seal or spans_cleaned but state.slices was empty. Those events are metadata, not slice history. Fix - the orphan check only counts slice-transition events (slice_activated / slice_completed / slice_cancelled / unlocked / emergency_unlock).'
  touches:
  - packages/pragma/src/pragma/core/recovery.py
  permutations:
  - id: hooks_seal_only_does_not_trip_orphan
    description: audit.jsonl containing only hooks_seal entries does not produce audit_orphan
    expected: success
  - id: slice_transition_without_state_does_trip
    description: audit.jsonl containing a slice_activated entry with empty state.slices still produces audit_orphan
    expected: success
  milestone: M01
  slice: M01.S18
- id: REQ-030
  title: freeze rebinds state.manifest_hash when neutral
  description: 'BUG-032. pragma freeze must rebind state.manifest_hash to the new lock hash when active_slice is None. Leaves state untouched when a slice is active so mid-slice drift still surfaces in verify gate.'
  touches:
  - packages/pragma/src/pragma/cli/commands/freeze.py
  permutations:
  - id: rebinds_when_neutral
    description: freeze on a greenfield with no active slice rebinds state.manifest_hash
    expected: success
  - id: leaves_state_when_slice_active
    description: freeze during an active slice does not touch state.manifest_hash
    expected: success
  milestone: M01
  slice: M01.S19
milestones:
- id: M00
  title: Implicit brownfield milestone
  description: Auto-created by `pragma migrate` to wrap pre-v0.2 flat requirements. Safe to rename when
    the project grows real milestones.
  depends_on: []
  slices:
  - id: M00.S0
    title: Implicit brownfield slice
    description: Auto-created by `pragma migrate`. All pre-v0.2 requirements live here until the user
      carves real slices.
    requirements:
    - REQ-001
    - REQ-002
- id: M01
  title: Gate and slice
  description: v0.2 gate state machine, slice lifecycle, unlock.
  depends_on: []
  slices:
  - id: M01.S1
    title: Slice gate
    description: activate, unlock with red tests, complete.
    requirements:
    - REQ-003
  - id: M01.S2
    title: v0.3 hooks and battery
    description: Claude Code hooks + safety battery + integrity seal.
    requirements:
    - REQ-004
  - id: M01.S3
    title: v0.4 SDK, PIL, narrative
    description: Runtime SDK package, Post-Implementation Log, narrative artifacts.
    requirements:
    - REQ-005
  - id: M01.S4
    title: v1.0 greenfield bootstrap and determinism
    description: Greenfield init flow, plan-greenfield Pattern C, real doctor recovery, determinism acceptance.
    requirements:
    - REQ-006
  - id: M01.S5
    title: v1.0.1 patch - ruff rev alignment, freeze error serialisation, collector parser
    description: Stabilisation slice patching three bugs surfaced during the v1.0 release - ruff pre-commit rev skew vs local ruff, freeze crashing with non-serializable ValueError when a requirement references a non-existent milestone, and the pytest 9 collect-only parser returning zero nodeids when parent addopts pin -q.
    requirements:
    - REQ-007
    - REQ-008
    - REQ-009
  - id: M01.S6
    title: v1.0.5 span retention
    description: doctor --clean-spans with keep_runs / keep_days retention and manifest config. Closes the v1.0.4-parked paper cut that .pragma/spans/ accumulates forever.
    requirements:
    - REQ-010
  - id: M01.S7
    title: v1.0.6 bug sweep
    description: Closes BUG-015 (run_tests inherited -q), BUG-016 (slice cancel leaves stale manifest_hash), BUG-017 (greenfield scaffold missing src import glue), BUG-018 (ex-KI-13, slice complete subprocess cwd on nested tests_root), BUG-019 (ex-KI-14, deptry false-positives on pragma pyproject).
    requirements:
    - REQ-011
    - REQ-012
    - REQ-013
    - REQ-014
    - REQ-015
  - id: M01.S8
    title: v1.1.0 first-run PIL reachable
    description: Close BUG-020 (Pragma's internal pytest runs clear --junit-xml via -o addopts=, so PIL shows 0 verified on a fresh first-run project even when user follows the docs). Scope is the full proof chain - subprocess emits junit, report surfaces artifact gaps instead of silently returning "missing" everywhere, smoke script asserts the end-to-end PIL story, docs describe the loop as it is.
    requirements:
    - REQ-016
    - REQ-017
    - REQ-018
    - REQ-019
  - id: M01.S9
    title: v1.1.1 multi-slice PIL reflects the whole project
    description: Close BUG-021. `pragma slice complete` runs pytest on only the current slice's nodeids for the gate check, and the resulting junit.xml overwrites the previous slice's. After shipping N slices, `pragma report` shows only the Nth slice's tests as verified and every earlier slice's permutations as missing. Fix - after the per-slice gate run succeeds, do a second full-suite run to regenerate a complete junit.xml covering every test in the project. Also teaches the smoke script to ship two slices, not one.
    requirements:
    - REQ-020
  - id: M01.S10
    title: v1.1.2 state.manifest_hash rebinds on every transition
    description: Close BUG-022. Gate-state writing transitions (activate, unlock, complete, cancel) preserved state.manifest_hash from the previous state. Cancel was fixed in v1.0.6 (BUG-016). But greenfield scaffold writes state.json with the original manifest hash, and the user's first `pragma freeze` after editing the seed manifest produces a new hash. Activate, unlock, and complete all propagate the old hash, so after shipping all slices (or cancelling the last one without re-freezing) state.manifest_hash is stale vs the lock. verify gate fails with gate_hash_drift, emergency-unlock refuses (already-neutral), user must delete state.json by hand. Fix - every transition takes an optional manifest_hash arg and rebinds when given, same pattern as cancel in v1.0.6.
    requirements:
    - REQ-021
  - id: M01.S11
    title: slice activate refuses to un-ship a shipped slice (BUG-024)
    description: Surfaced by the v0.1.0 edge-case dogfood. `pragma slice activate <id>` on a slice already in state.slices with status=shipped silently flipped it back to in_progress + LOCKED, losing the ship record, blocking dep-gated slices that were previously free to activate, and leaving no doctor diagnostic. Fix - refuse activation when the requested slice is already shipped, with a remediation pointing at either --force (if the intent is explicit re-open) or just noting that shipped slices are terminal.
    requirements:
    - REQ-022
  - id: M01.S12
    title: single-permutation courtesy in PIL (BUG-023)
    description: 'The aggregator comment in packages/pragma/src/pragma/report/aggregator.py claimed that a requirement with exactly one permutation whose test omits `set_permutation(...)` would still score `ok`. Implementation never matched the claim; such permutations scored `mocked` because the span''s `pragma.permutation` attribute was `"none"` and the matcher required `span_perm == perm_id`. Fix - thread total-permutations-on-requirement into the matcher; when total==1, accept a span with `pragma.permutation == "none"` as matching.'
    requirements:
    - REQ-023
  - id: M01.S13
    title: narrative commit drops noise + summarises WHY (BUG-026)
    description: 'BUG-026. `pragma narrative commit` generated a commit message whose WHAT and WHERE sections listed every staged file including .pyc, .pragma/state.json.lock, audit.jsonl, and cache directories. The WHY was either a blind first-line echo of the active requirement''s description, or the literal placeholder string "Scope unclear; filling in." when no slice was active. Fix - filter the file list (skip .pyc / __pycache__ / .pragma / audit.jsonl / state lock files), summarise WHAT by distinct top-level directory when the list is long, and derive WHY from the active slice title + declared permutation verdicts when a slice is active.'
    requirements:
    - REQ-024
  - id: M01.S14
    title: narrative commit cites most-recent shipped slice (BUG-027)
    description: 'BUG-027. After `pragma slice complete`, active_slice is None by design. `pragma narrative commit` running in that window (a perfectly natural user flow: ship slice, then commit the change) emits WHY="Maintenance change outside any active slice." — factually correct but reads as amnesia when the user literally just shipped a slice seconds ago. Also, _summarise_files appended "/" to every path segment even when the segment was a single top-level file (e.g. "pragma.yaml/ (1)" instead of "pragma.yaml (1)"). Fix - (a) when active_slice is None but state.slices has a most-recently-shipped entry, cite its title/ID in WHY; (b) only append "/" to genuine directories (those that contained a slash in the original path).'
    requirements:
    - REQ-025
  - id: M01.S15
    title: pragma hooks verify returns ok=false on drift (BUG-029)
    description: 'BUG-029. `pragma hooks verify` returned `{"ok":true,"integrity":"drifted"}` + exit 0 when the hash detected tampering. Anyone scripting a CI or pre-push check against the `ok` field would treat drift as success. `pragma verify integrity` already has the strict contract (`{"error":...}` + exit 1 on drift); hooks verify was the inconsistent surface. Fix - when integrity is `drifted`, return `ok=false` and exit non-zero. `sealed` / `not_sealed` / `no_settings` keep `ok=true` (those are neutral-to-good states).'
    requirements:
    - REQ-026
  - id: M01.S16
    title: narrative remediation covers real error codes (BUG-028)
    description: 'BUG-028. The remediation catalogue in pragma.narrative.remediation only had entries for three discipline AST rules (complexity, nesting_depth, loc_per_function). Every other error code — commit_shape_violation, unlock_missing_tests, slice_already_shipped, gate_hash_drift, manifest_schema_error, etc. — fell through to a generic "Rule X triggered: got N budget M" placeholder that carried no useful signal for the user. Fix - add catalogue entries for the handful of error codes a user hits under CI / pre-push and wants specific guidance on. Keep the generic fallback for truly unknown codes so the CLI never crashes.'
    requirements:
    - REQ-027
  - id: M01.S17
    title: spec add-requirement accepts --milestone / --slice (BUG-031)
    description: 'BUG-031. `pragma spec add-requirement` had no flags for milestone or slice. Every requirement on v2 needs both (REQ-008 enforces this at freeze time). The authoring CLI could not produce a valid-freezable REQ — users had to hand-edit pragma.yaml after every add-requirement call. Fix - add optional --milestone and --slice options; thread to the Requirement model; when the target slice does not exist in the manifest, raise slice_not_found with a remediation that names the declared slices.'
    requirements:
    - REQ-028
  - id: M01.S18
    title: audit_orphan ignores non-slice events (BUG-030)
    description: 'BUG-030. `pragma doctor` reported an audit_orphan diagnostic when audit.jsonl had any entry but state.slices was empty. Events like hooks_seal and spans_cleaned populate audit without creating slice history; a fresh sandbox that had re-sealed its hash tripped the diagnostic despite having a perfectly valid empty state. Fix - only count slice-transition events (slice_activated, slice_completed, slice_cancelled, unlocked, emergency_unlock) toward audit_orphan detection.'
    requirements:
    - REQ-029
  - id: M01.S19
    title: freeze rebinds neutral-state manifest_hash (BUG-032)
    description: 'BUG-032. `pragma freeze` updated the lockfile but never updated state.manifest_hash. On a fresh greenfield project, the user edits the seed manifest (via plan-greenfield or spec add-requirement), runs freeze to update the lock, and immediately `pragma doctor` reports `stale_state` because state.json still carries the scaffold-init hash. The user did nothing wrong; freeze is the authoritative "lock on this manifest" action and should carry state along with it — but only when no slice is active (a rebind mid-active-slice would hide real drift the gate needs to catch).'
    requirements:
    - REQ-030
