name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-isolated:
    name: SDK isolated tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pragma-sdk
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/pragma-sdk[dev]"

      - name: Run SDK tests
        run: python -m pytest packages/pragma-sdk/tests -q

  full:
    name: test + lint + types + verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('packages/pragma/pyproject.toml', 'packages/pragma-sdk/pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-3.11-

      - name: Install both packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/pragma-sdk
          python -m pip install -e "packages/pragma[dev]"

      - name: Run tests
        run: python -m pytest packages/pragma/tests -q

      - name: Lint (ruff)
        run: python -m ruff check packages/

      - name: Format check (ruff)
        run: python -m ruff format --check packages/

      - name: Type check (mypy --strict, pragma dev-tool)
        working-directory: packages/pragma
        run: python -m mypy

      - name: Type check (mypy --strict, pragma-sdk runtime)
        working-directory: packages/pragma-sdk
        run: python -m mypy --strict src

      - name: Verify Pragma's manifest, gate, discipline, integrity
        run: pragma verify all --ci

  report-determinism:
    name: report determinism check
    runs-on: ubuntu-latest
    needs: full
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install both packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/pragma-sdk
          python -m pip install -e "packages/pragma[dev]"

      - name: Run tests (populate spans + junit at repo root)
        run: python -m pytest packages/pragma/tests -q

      - name: Assert spans and junit landed at repo root
        run: |
          test -s .pragma/spans/test-run.jsonl || { echo "ERROR: spans dump missing — plugin or rootdir misconfigured"; exit 1; }
          test -s .pragma/pytest-junit.xml || { echo "ERROR: junit xml missing — pytest config not wired"; exit 1; }

      - name: Generate report A
        run: pragma report --json > /tmp/a.json

      - name: Generate report B
        run: pragma report --json > /tmp/b.json

      - name: Assert report has at least one ok permutation (dogfood)
        run: |
          python -c "import json, sys; d=json.load(open('/tmp/a.json')); sys.exit(0 if d['summary']['ok'] > 0 else 1)" \
            || { echo "ERROR: report shows zero ok permutations — dogfood is not exercising @trace"; exit 1; }

      - name: Diff reports
        run: diff /tmp/a.json /tmp/b.json

  greenfield-smoke:
    name: greenfield e2e
    runs-on: ubuntu-latest
    needs: full
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install both packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/pragma-sdk
          python -m pip install -e "packages/pragma[dev]"

      - name: Run greenfield end-to-end smoke
        run: bash tests/acceptance/test_greenfield_e2e.sh
